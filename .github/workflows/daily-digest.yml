name: 🌅 Daily Tech Digest

on:
  schedule:
    # Runs every day at 2:00 AM UTC = 7:30 AM IST
    - cron: '0 2 * * *'
  # Allows you to run it manually from the Actions tab anytime
  workflow_dispatch:

jobs:
  build-and-deliver:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to commit digest.md back to repo

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🗞️ Generate digest
        run: python daily_digest.py

      - name: 📧 Send email (if credentials set)
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python send_email.py

      - name: 💾 Commit digest to repository
        run: |
          git config --global user.name  "Tech Digest Bot"
          git config --global user.email "bot@noreply.github.com"
          git add digest.md
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "📰 Daily digest — $(date +'%Y-%m-%d')"
          git push